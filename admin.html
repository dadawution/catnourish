<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>貓咪照護飲食誌 後台管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1410; --ink-2: #3d3028; --muted: #8c7d70;
      --border: #e5ddd5; --cream: #faf8f4; --warm: #f2ece3;
      --teal: #2d6e6e; --teal-light: #e8f2f2;
      --amber: #c47c2e; --amber-light: #fdf0e0;
      --sage: #5a7a5a; --sage-light: #eaf2ea;
      --red: #c44; --red-light: #fff0f0;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--cream); color: var(--ink); font-family: 'Noto Sans TC', sans-serif; font-size: 15px; line-height: 1.7; }

    /* ── SETUP SCREEN ── */
    #setupScreen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .setup-box {
      background: white; border: 1px solid var(--border); border-radius: 16px;
      padding: 40px; max-width: 460px; width: 100%;
    }
    .setup-logo { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; color: var(--teal); font-weight: 900; margin-bottom: 4px; }
    .setup-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 28px; }
    .setup-box h2 { font-size: 1rem; font-weight: 600; color: var(--ink); margin-bottom: 20px; }
    .setup-field { margin-bottom: 14px; }
    .setup-field label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--muted); margin-bottom: 5px; }
    .setup-field input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; font-family: inherit; background: var(--cream); outline: none; }
    .setup-field input:focus { border-color: var(--teal); background: white; }
    .setup-hint { font-size: 0.75rem; color: var(--muted); margin-top: 4px; line-height: 1.5; }
    .setup-err { color: var(--red); font-size: 0.8rem; margin-top: 4px; display: none; }
    .btn-setup { width: 100%; margin-top: 20px; padding: 12px; background: var(--teal); color: white; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn-setup:hover { background: #1f5555; }

    /* ── MAIN ADMIN ── */
    #adminApp { display: none; }

    .admin-nav {
      background: var(--ink); padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .admin-logo { font-family: 'Noto Serif TC', serif; font-size: 0.95rem; font-weight: 700; color: white; }
    .admin-logo span { color: #7ec8c8; }
    .admin-nav-right { display: flex; gap: 10px; align-items: center; }
    .nav-badge { font-size: 0.72rem; color: rgba(255,255,255,0.4); }
    .nav-btn { background: rgba(255,255,255,0.1); color: white; border: none; padding: 7px 16px; border-radius: 6px; font-size: 0.78rem; cursor: pointer; font-family: inherit; }
    .nav-btn:hover { background: rgba(255,255,255,0.2); }

    .admin-body { max-width: 920px; margin: 40px auto; padding: 0 24px 80px; }
    .page-title { font-family: 'Noto Serif TC', serif; font-size: 1.4rem; color: var(--ink); margin-bottom: 28px; }

    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
    .tab { padding: 10px 20px; border: none; background: none; font-size: 0.875rem; color: var(--muted); cursor: pointer; font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.active { color: var(--teal); border-bottom-color: var(--teal); font-weight: 500; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── FORM ── */
    .form-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 20px; }
    .form-card h2 { font-family: 'Noto Serif TC', serif; font-size: 1.05rem; color: var(--ink); margin-bottom: 20px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--ink-2); margin-bottom: 5px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 0.875rem; font-family: inherit; color: var(--ink);
      background: var(--cream); outline: none; transition: border 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--teal); background: white; }
    .form-group textarea { resize: vertical; min-height: 200px; line-height: 1.7; }
    .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
    .btn { padding: 10px 22px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 500; font-family: inherit; transition: all 0.2s; }
    .btn-primary { background: var(--teal); color: white; }
    .btn-primary:hover { background: #1f5555; }
    .btn-ghost { background: var(--warm); color: var(--ink); }
    .btn-ai { background: var(--sage); color: white; }
    .btn-ai:hover { background: #3d5e3d; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── AI STATUS ── */
    .ai-status { display: none; align-items: center; gap: 10px; padding: 12px 16px; background: var(--sage-light); border-radius: 8px; font-size: 0.85rem; color: var(--sage); margin-bottom: 16px; border: 1px solid #c5ddc5; }
    .ai-status.on { display: flex; }
    .ai-status.err { background: var(--red-light); color: var(--red); border-color: #f0c0c0; }
    .spin { width: 14px; height: 14px; border: 2px solid var(--sage); border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    .ai-status.err .spin { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LIST ── */
    .admin-list { display: flex; flex-direction: column; gap: 10px; }
    .admin-item { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .item-info { flex: 1; min-width: 0; }
    .item-cat { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: var(--teal-light); color: var(--teal); display: inline-block; margin-bottom: 3px; }
    .item-title { font-weight: 500; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-meta { font-size: 0.72rem; color: #bbb; margin-top: 2px; }
    .item-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-sm { padding: 5px 12px; border-radius: 6px; border: none; font-size: 0.76rem; cursor: pointer; font-family: inherit; }
    .btn-del { background: var(--red-light); color: var(--red); }
    .btn-del:hover { background: #ffd8d8; }
    .empty-state { text-align: center; padding: 60px; color: var(--muted); font-size: 0.9rem; }

    /* ── SAVE STATUS ── */
    .save-status { display: none; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 16px; }
    .save-status.on { display: flex; }
    .save-status.saving { background: var(--teal-light); color: var(--teal); }
    .save-status.ok { background: var(--sage-light); color: var(--sage); }
    .save-status.err { background: var(--red-light); color: var(--red); }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--sage); color: white; padding: 12px 20px; border-radius: 8px; font-size: 0.875rem; transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 999; }
    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 600px) {
      .form-row-2 { grid-template-columns: 1fr; }
      .admin-nav { padding: 0 16px; }
      .admin-body { padding: 0 16px 60px; }
    }
  </style>
</head>
<body>

<!-- ══ SETUP SCREEN ══ -->
<div id="setupScreen">
  <div class="setup-box">
    <div class="setup-logo">貓咪照護飲食誌</div>
    <div class="setup-sub">Cat Nourish Journal 後台管理系統</div>
    <h2>🔐 連接 GitHub 設定</h2>
    <div class="setup-field">
      <label>GitHub Token</label>
      <input type="password" id="cfgToken" placeholder="ghp_xxxxxxxxxxxx">
      <div class="setup-hint">Settings → Developer settings → Personal access tokens → 勾選 repo 權限</div>
    </div>
    <div class="setup-field">
      <label>GitHub 使用者名稱</label>
      <input type="text" id="cfgOwner" placeholder="dadawution">
    </div>
    <div class="setup-field">
      <label>Repository 名稱</label>
      <input type="text" id="cfgRepo" placeholder="bionature">
    </div>
    <div class="setup-field">
      <label>分支</label>
      <input type="text" id="cfgBranch" placeholder="main" value="main">
    </div>
    <div class="setup-err" id="setupErr">連線失敗，請檢查設定</div>
    <button class="btn-setup" id="connectBtn" onclick="connectGitHub()">連線並進入後台</button>
  </div>
</div>

<!-- ══ ADMIN APP ══ -->
<div id="adminApp">
  <nav class="admin-nav">
    <div class="admin-logo">貓咪照護飲食誌 <span>後台</span></div>
    <div class="admin-nav-right">
      <span class="nav-badge" id="repoLabel"></span>
      <button class="nav-btn" onclick="window.open('index.html','_blank')">查看網站 ↗</button>
      <button class="nav-btn" onclick="disconnect()">登出</button>
    </div>
  </nav>

  <div class="admin-body">
    <div class="page-title">✍️ 內容管理</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('new')">新增文章</button>
      <button class="tab" onclick="switchTab('list')">所有文章</button>
      <button class="tab" onclick="switchTab('faq')">管理 FAQ</button>
    </div>

    <!-- ── TAB: NEW ARTICLE ── -->
    <div class="tab-panel active" id="tab-new">
      <div class="form-card">
        <h2>✨ AI 輔助文章生成</h2>
        <div class="form-row-2">
          <div class="form-group">
            <label>文章分類</label>
            <select id="aTag">
              <option>飲食照護</option>
              <option>熟齡貓照護</option>
              <option>副食與營養</option>
              <option>品牌觀點</option>
              <option>常見問題</option>
            </select>
          </div>
          <div class="form-group">
            <label>文章類型</label>
            <select id="aType">
              <option value="問題型">問題型（貓咪XXX怎麼辦？）</option>
              <option value="知識型">知識型（XXX是什麼？）</option>
              <option value="解決方案型">解決方案型（如何選擇XXX）</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>文章主題（AI 生成用）</label>
          <input type="text" id="aTopic" placeholder="例如：老貓吃不下飯怎麼辦？">
        </div>
        <div class="ai-status" id="aiSt">
          <div class="spin" id="aiSpin"></div>
          <span id="aiStText">AI 生成中...</span>
        </div>
        <div style="margin-bottom:20px">
          <button class="btn btn-ai" id="genBtn" onclick="genArticle()">🤖 AI 生成文章</button>
        </div>
        <div class="form-group">
          <label>文章標題（H1）</label>
          <input type="text" id="aTitle" placeholder="自動填入或手動輸入">
        </div>
        <div class="form-group">
          <label>文章摘要（100字以內）</label>
          <input type="text" id="aExcerpt" placeholder="一句話說明文章重點">
        </div>
        <div class="form-group">
          <label>封面圖片網址（選填，Cloudinary URL）</label>
          <input type="text" id="aCover" placeholder="https://res.cloudinary.com/...">
        </div>
        <div class="form-group">
          <label>文章 Emoji（無封面圖時顯示）</label>
          <input type="text" id="aEmoji" placeholder="🐱" style="width:80px">
        </div>
        <div class="form-group">
          <label>文章內容（支援 ## 小標題、### 三級標題、- 清單）</label>
          <textarea id="aBody" placeholder="AI 生成後自動填入，或手動撰寫..."></textarea>
        </div>
        <div class="form-group">
          <label>FAQ（每行一組，格式：問題::回答）</label>
          <textarea id="aFaq" style="min-height:100px" placeholder="老貓幾歲開始::通常7歲以上&#10;低磷有效嗎::有助於減少腎臟負擔"></textarea>
        </div>
        <div class="save-status" id="pubStatus"></div>
        <div class="btn-row">
          <button class="btn btn-ghost" onclick="clearForm()">清除</button>
          <button class="btn btn-primary" id="pubBtn" onclick="publishArticle()">📤 發布到 GitHub</button>
        </div>
      </div>
    </div>

    <!-- ── TAB: ARTICLE LIST ── -->
    <div class="tab-panel" id="tab-list">
      <div class="save-status" id="delStatus"></div>
      <div id="articleList"></div>
    </div>

    <!-- ── TAB: FAQ ── -->
    <div class="tab-panel" id="tab-faq">
      <div class="form-card" style="margin-bottom:20px">
        <h2>新增常見問答</h2>
        <div class="form-row-2">
          <div class="form-group">
            <label>問答分類</label>
            <select id="faqCat">
              <option>貓咪飲食</option>
              <option>副食選擇</option>
              <option>產品使用</option>
              <option>成分與安全</option>
            </select>
          </div>
          <div class="form-group" style="flex:2">
            <label>問題</label>
            <input type="text" id="faqQ" placeholder="例如：貓咪每天可以吃幾包肉泥？">
          </div>
        </div>
        <div class="form-group">
          <label>回答</label>
          <textarea id="faqA" style="min-height:80px" placeholder="清楚回答這個問題..."></textarea>
        </div>
        <div class="save-status" id="faqPubStatus"></div>
        <div class="btn-row">
          <button class="btn btn-primary" id="faqPubBtn" onclick="addFaq()">新增並儲存到 GitHub</button>
        </div>
      </div>
      <div id="faqList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// CONFIG & STATE
// ══════════════════════════════════════════
let cfg = { token: '', owner: '', repo: '', branch: 'main' };
let articles = [];
let faqs = [];

const ARTICLES_PATH = 'articles.json';
const FAQS_PATH = 'faqs.json';

// ══════════════════════════════════════════
// GITHUB API HELPERS
// ══════════════════════════════════════════
async function ghFetch(path, options = {}) {
  const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
  const headers = {
    'Authorization': `token ${cfg.token}`,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
  return fetch(url, { ...options, headers: { ...headers, ...(options.headers || {}) } });
}

async function getFile(path) {
  const res = await ghFetch(path);
  if (!res.ok) throw new Error('getFile failed: ' + res.status);
  const data = await res.json();
  const decoded = new TextDecoder('utf-8').decode(
    Uint8Array.from(atob(data.content.replace(/\n/g, '')), c => c.charCodeAt(0))
  );
  return { content: JSON.parse(decoded), sha: data.sha };
}

async function putFile(path, content, sha, message) {
  const jsonStr = JSON.stringify(content, null, 2);
  const encoded = btoa(String.fromCharCode(...new TextEncoder().encode(jsonStr)));
  const body = {
    message,
    content: encoded,
    sha,
    branch: cfg.branch
  };
  const res = await ghFetch(path, { method: 'PUT', body: JSON.stringify(body) });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || 'putFile failed');
  }
  return res.json();
}

// ══════════════════════════════════════════
// SETUP / CONNECT
// ══════════════════════════════════════════
async function connectGitHub() {
  const token = document.getElementById('cfgToken').value.trim();
  const owner = document.getElementById('cfgOwner').value.trim();
  const repo = document.getElementById('cfgRepo').value.trim();
  const branch = document.getElementById('cfgBranch').value.trim() || 'main';
  if (!token || !owner || !repo) { showSetupErr('請填寫所有欄位'); return; }
  const btn = document.getElementById('connectBtn');
  btn.disabled = true;
  btn.textContent = '連線中...';
  try {
    cfg = { token, owner, repo, branch };
    const [aData, fData] = await Promise.all([getFile(ARTICLES_PATH), getFile(FAQS_PATH)]);
    articles = aData.content;
    faqs = fData.content;
    // Save to localStorage
    localStorage.setItem('bio_cfg', JSON.stringify({ owner, repo, branch }));
    localStorage.setItem('bio_token', token);
    enterAdmin();
  } catch(e) {
    showSetupErr('連線失敗：' + e.message);
    btn.disabled = false;
    btn.textContent = '連線並進入後台';
  }
}

function showSetupErr(msg) {
  const el = document.getElementById('setupErr');
  el.textContent = msg;
  el.style.display = 'block';
}

async function tryAutoConnect() {
  const savedCfg = localStorage.getItem('bio_cfg');
  const savedToken = localStorage.getItem('bio_token');
  if (!savedCfg || !savedToken) return;
  const { owner, repo, branch } = JSON.parse(savedCfg);
  document.getElementById('cfgOwner').value = owner;
  document.getElementById('cfgRepo').value = repo;
  document.getElementById('cfgBranch').value = branch;
  cfg = { token: savedToken, owner, repo, branch };
  try {
    const [aData, fData] = await Promise.all([getFile(ARTICLES_PATH), getFile(FAQS_PATH)]);
    articles = aData.content;
    faqs = fData.content;
    enterAdmin();
  } catch(e) {
    // auto-connect failed, show setup screen normally
  }
}

function enterAdmin() {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('adminApp').style.display = 'block';
  document.getElementById('repoLabel').textContent = `${cfg.owner}/${cfg.repo}`;
  renderArticleList();
  renderFaqList();
}

function disconnect() {
  localStorage.removeItem('bio_token');
  location.reload();
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['new','list','faq'][i] === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ══════════════════════════════════════════
// AI GENERATE
// ══════════════════════════════════════════
async function genArticle() {
  const topic = document.getElementById('aTopic').value.trim();
  const tag = document.getElementById('aTag').value;
  const type = document.getElementById('aType').value;
  if (!topic) { alert('請填寫文章主題'); return; }
  const st = document.getElementById('aiSt');
  const btn = document.getElementById('genBtn');
  st.className = 'ai-status on';
  document.getElementById('aiStText').textContent = 'AI 正在生成文章...';
  btn.disabled = true;
  const prompt = `你是貓咪照護飲食誌（Cat Nourish Journal）的內容編輯，這是一個獨立第三方的貓咪飲食與照護知識站，不隸屬任何品牌。

請撰寫一篇繁體中文文章：
- 分類：${tag}
- 類型：${type}
- 主題：${topic}

回應純 JSON，格式：
{"title":"H1標題","excerpt":"100字內摘要","body":"正文（## 小標題，600-800字）","faq":[{"q":"問題","a":"回答"},{"q":"問題","a":"回答"},{"q":"問題","a":"回答"}],"emoji":"一個相關emoji"}

要求：
- 內容實用、有知識感，適合飼主閱讀
- 以第三方客觀立場撰寫，不替任何特定品牌背書
- 至少3個##小標題
- 正文自然帶入飲食照護概念
- FAQ 3組，問題要實際
- 只回傳JSON`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const text = data.content.map(i => i.text || '').join('');
    const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
    document.getElementById('aTitle').value = parsed.title || '';
    document.getElementById('aExcerpt').value = parsed.excerpt || '';
    document.getElementById('aBody').value = parsed.body || '';
    document.getElementById('aEmoji').value = parsed.emoji || '📝';
    if (parsed.faq) {
      document.getElementById('aFaq').value = parsed.faq.map(f => `${f.q}::${f.a}`).join('\n');
    }
    st.className = 'ai-status on';
    document.getElementById('aiStText').textContent = '✅ 生成完成！請確認內容後發布。';
    setTimeout(() => { st.className = 'ai-status'; }, 3500);
  } catch(e) {
    st.className = 'ai-status err on';
    document.getElementById('aiStText').textContent = '❌ 生成失敗，請重試';
    console.error(e);
  }
  btn.disabled = false;
}

// ══════════════════════════════════════════
// PUBLISH ARTICLE
// ══════════════════════════════════════════
async function publishArticle() {
  const title = document.getElementById('aTitle').value.trim();
  const body = document.getElementById('aBody').value.trim();
  if (!title || !body) { alert('請填寫標題和內容'); return; }
  const faqRaw = document.getElementById('aFaq').value.trim();
  const faqParsed = faqRaw
    ? faqRaw.split('\n').filter(l => l.includes('::')).map(l => {
        const [q, ...rest] = l.split('::');
        return { q: q.trim(), a: rest.join('::').trim() };
      })
    : [];
  const newArticle = {
    id: Date.now(),
    tag: document.getElementById('aTag').value,
    type: document.getElementById('aType').value,
    title,
    excerpt: document.getElementById('aExcerpt').value.trim(),
    cover: document.getElementById('aCover').value.trim(),
    emoji: document.getElementById('aEmoji').value.trim() || '📝',
    body,
    faq: faqParsed,
    date: new Date().toISOString().slice(0, 10)
  };
  setSaveStatus('pubStatus', 'saving', '⏳ 儲存到 GitHub 中...');
  document.getElementById('pubBtn').disabled = true;
  try {
    const { sha } = await getFile(ARTICLES_PATH);
    articles.unshift(newArticle);
    await putFile(ARTICLES_PATH, articles, sha, `新增文章：${title}`);
    clearForm();
    renderArticleList();
    setSaveStatus('pubStatus', 'ok', '✅ 發布成功！文章已上傳到 GitHub。');
    showToast('✅ 文章已發布！');
    setTimeout(() => hideSaveStatus('pubStatus'), 4000);
  } catch(e) {
    setSaveStatus('pubStatus', 'err', '❌ 發布失敗：' + e.message);
  }
  document.getElementById('pubBtn').disabled = false;
}

function clearForm() {
  ['aTopic','aTitle','aExcerpt','aCover','aEmoji','aBody','aFaq'].forEach(id => {
    document.getElementById(id).value = id === 'aEmoji' ? '📝' : '';
  });
}

// ══════════════════════════════════════════
// ARTICLE LIST
// ══════════════════════════════════════════
function renderArticleList() {
  const el = document.getElementById('articleList');
  if (!articles.length) {
    el.innerHTML = '<div class="empty-state">還沒有文章</div>';
    return;
  }
  el.innerHTML = `<div class="admin-list">${articles.map(a => `
    <div class="admin-item">
      <div class="item-info">
        <span class="item-cat">${a.tag}</span>
        <div class="item-title">${a.title}</div>
        <div class="item-meta">${a.date} ・ ${a.type}</div>
      </div>
      <div class="item-actions">
        <button class="btn-sm btn-del" onclick="deleteArticle(${a.id})">刪除</button>
      </div>
    </div>`).join('')}</div>`;
}

async function deleteArticle(id) {
  if (!confirm('確定刪除這篇文章？')) return;
  setSaveStatus('delStatus', 'saving', '⏳ 刪除中...');
  try {
    const { sha } = await getFile(ARTICLES_PATH);
    articles = articles.filter(a => a.id !== id);
    await putFile(ARTICLES_PATH, articles, sha, '刪除文章');
    renderArticleList();
    setSaveStatus('delStatus', 'ok', '✅ 已刪除');
    showToast('已刪除');
    setTimeout(() => hideSaveStatus('delStatus'), 3000);
  } catch(e) {
    setSaveStatus('delStatus', 'err', '❌ 刪除失敗：' + e.message);
  }
}

// ══════════════════════════════════════════
// FAQ
// ══════════════════════════════════════════
function renderFaqList() {
  const el = document.getElementById('faqList');
  if (!faqs.length) {
    el.innerHTML = '<div class="empty-state">還沒有問答</div>';
    return;
  }
  el.innerHTML = `<div class="admin-list">${faqs.map(f => `
    <div class="admin-item">
      <div class="item-info">
        <span class="item-cat">${f.cat}</span>
        <div class="item-title">${f.q}</div>
        <div class="item-meta" style="white-space:normal;font-size:0.75rem;color:var(--muted)">${f.a.slice(0, 60)}...</div>
      </div>
      <div class="item-actions">
        <button class="btn-sm btn-del" onclick="deleteFaq(${f.id})">刪除</button>
      </div>
    </div>`).join('')}</div>`;
}

async function addFaq() {
  const cat = document.getElementById('faqCat').value;
  const q = document.getElementById('faqQ').value.trim();
  const a = document.getElementById('faqA').value.trim();
  if (!q || !a) { alert('請填寫問題和回答'); return; }
  setSaveStatus('faqPubStatus', 'saving', '⏳ 儲存中...');
  document.getElementById('faqPubBtn').disabled = true;
  try {
    const { sha } = await getFile(FAQS_PATH);
    faqs.unshift({ id: Date.now(), cat, q, a });
    await putFile(FAQS_PATH, faqs, sha, `新增FAQ：${q}`);
    document.getElementById('faqQ').value = '';
    document.getElementById('faqA').value = '';
    renderFaqList();
    setSaveStatus('faqPubStatus', 'ok', '✅ 問答已新增！');
    showToast('✅ 問答已新增！');
    setTimeout(() => hideSaveStatus('faqPubStatus'), 3000);
  } catch(e) {
    setSaveStatus('faqPubStatus', 'err', '❌ 儲存失敗：' + e.message);
  }
  document.getElementById('faqPubBtn').disabled = false;
}

async function deleteFaq(id) {
  if (!confirm('確定刪除？')) return;
  try {
    const { sha } = await getFile(FAQS_PATH);
    faqs = faqs.filter(f => f.id !== id);
    await putFile(FAQS_PATH, faqs, sha, '刪除FAQ');
    renderFaqList();
    showToast('已刪除');
  } catch(e) {
    alert('刪除失敗：' + e.message);
  }
}

// ══════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════
function setSaveStatus(id, type, msg) {
  const el = document.getElementById(id);
  el.className = `save-status on ${type}`;
  el.textContent = msg;
}
function hideSaveStatus(id) {
  document.getElementById(id).className = 'save-status';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

tryAutoConnect();
</script>
